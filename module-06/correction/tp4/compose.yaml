---
services:
  front:
    build:
      context: .
      dockerfile: Dockerfile.front
    ports:
      - ${FRONT_PORT}:80
    container_name: ${PROJECT_NAME}-front

  back:
    build:
      context: .
      dockerfile: Dockerfile.back
    depends_on:
      - db
    restart: always
    ports:
      - ${BACK_PORT}:80
    container_name: ${PROJECT_NAME}-back
  db:
    image: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/db-password
      MARIADB_DATABASE: ${DB_NAME}
    volumes:
      - db-data:/var/lib/mysql
      - ./db/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
volumes:
  db-data:

